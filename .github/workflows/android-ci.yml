name: Android CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  android-build:
    name: Android compile and unit checks
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Compile Android and Wear
        run: ./gradlew :app:compileDebugKotlin :wear:compileDebugKotlin --stacktrace

      - name: Run unit tests
        run: ./gradlew :shared:test :features:auth:testDebugUnitTest --stacktrace
